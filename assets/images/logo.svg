<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="z8e Ai automation logo">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0b1220" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Soft gradient circle -->
  <circle cx="100" cy="100" r="84" fill="url(#g)" filter="url(#s)" />

  <!-- Stylized 'z8e' logotype -->
  <g transform="translate(100,110)" text-anchor="middle" font-family="Inter,Segoe UI,Arial" fill="#fff">
    <text x="0" y="-6" font-size="46" font-weight="700" letter-spacing="-2">z8e</text>
    <text x="34" y="8" font-size="14" font-weight="600" opacity="0.95">Ai</text>
  </g>

  <!-- Subtle gear slice to hint automation -->
  <g transform="translate(20,20) scale(0.32)" fill="#ffffff22">
    <path d="M162 96a66 66 0 1 0-2 24l18 10 14-8-6-20a66 66 0 0 0-24-6z"/>
  </g>
</svg>
