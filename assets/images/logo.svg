<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="120" height="120" role="img" aria-label="Vision AI Automation logo">
  <defs>
    <linearGradient id="logoGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle with subtle gradient -->
  <circle cx="60" cy="60" r="58" fill="rgba(10, 10, 15, 0.3)" stroke="url(#logoGradient1)" stroke-width="0.5" opacity="0.6"/>

  <!-- Core vision element - stylized eye/lens -->
  <g filter="url(#glow)">
    <!-- Outer ring -->
    <circle cx="60" cy="50" r="20" fill="none" stroke="url(#logoGradient1)" stroke-width="2" opacity="0.8"/>
    
    <!-- Middle ring -->
    <circle cx="60" cy="50" r="12" fill="none" stroke="url(#logoGradient2)" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Inner pupil with gradient -->
    <circle cx="60" cy="50" r="5" fill="url(#logoGradient1)" opacity="0.9"/>
    
    <!-- Highlight for dimension -->
    <circle cx="62" cy="48" r="2" fill="#00d4ff" opacity="0.6"/>
  </g>

  <!-- AI Neural network lines suggesting automation -->
  <g stroke="url(#logoGradient1)" stroke-width="1.2" fill="none" opacity="0.7" stroke-linecap="round">
    <!-- Left neural path -->
    <path d="M 35 35 Q 45 45 55 48" />
    <circle cx="35" cy="35" r="1.5" fill="#00d4ff" opacity="0.8"/>
    
    <!-- Right neural path -->
    <path d="M 85 35 Q 75 45 65 48" />
    <circle cx="85" cy="35" r="1.5" fill="#a855f7" opacity="0.8"/>
    
    <!-- Bottom neural path -->
    <path d="M 40 75 Q 50 68 58 52" />
    <circle cx="40" cy="75" r="1.5" fill="#ec4899" opacity="0.8"/>
    
    <!-- Right bottom neural path -->
    <path d="M 80 75 Q 70 68 62 52" />
    <circle cx="80" cy="75" r="1.5" fill="#00d4ff" opacity="0.8"/>
  </g>

  <!-- Automation arrows - subtle directional flow -->
  <g stroke="url(#logoGradient2)" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Circular flow indicator -->
    <path d="M 75 45 A 8 8 0 0 1 85 55" />
    <polygon points="85,55 87,50 82,52" fill="url(#logoGradient2)" opacity="0.5"/>
  </g>

  <!-- Data flow wave at bottom -->
  <g fill="none" stroke="url(#logoGradient1)" stroke-width="1" opacity="0.4" stroke-linecap="round">
    <path d="M 30 90 Q 40 85 50 90 T 70 90 T 90 90"/>
  </g>
</svg>
